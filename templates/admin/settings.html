{% extends 'base.html' %}
{% block title %}系统设置{% endblock %}
{% block content %}
{% raw %}
<div id="settings-app" class="row justify-content-center">
  <div class="col-md-8">
    <div class="card mb-3">
      <div class="card-header"><i class="bi bi-hdd-stack"></i> 数据库信息</div>
      <div class="card-body py-2">
        <div class="small text-muted">当前实际连接路径</div>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
          <span class="badge bg-dark text-uppercase">{{ databaseInfo.engine || '-' }}</span>
          <span class="small text-muted">引擎</span>
        </div>
        <div class="font-monospace small text-break">{{ databaseInfo.path || '-' }}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><i class="bi bi-gear"></i> 系统设置</div>
      <div class="card-body">
        <div v-if="saved" class="alert alert-success">设置已保存</div>
        <div v-if="error" class="alert alert-danger">{{ error }}</div>

        <h6 class="border-bottom pb-2 mb-3">功能开关</h6>
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" v-model="s.registration_enabled" id="reg">
              <label class="form-check-label" for="reg">开放注册</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" v-model="s.pool_enabled" id="pool">
              <label class="form-check-label" for="pool">票池开放</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" v-model="s.mode_a_enabled" id="ma">
              <label class="form-check-label" for="ma">A模式（逐单）</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" v-model="s.mode_b_enabled" id="mb">
              <label class="form-check-label" for="mb">B模式（批量）</label>
            </div>
          </div>
        </div>

        <h6 class="border-bottom pb-2 mb-3">会话设置</h6>
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label">无活动超时（小时）</label>
            <input v-model.number="s.session_lifetime_hours" type="number" class="form-control" min="1" max="24">
          </div>
          <div class="col-md-6">
            <label class="form-label">每日重置时间（小时，24制）</label>
            <input v-model.number="s.daily_reset_hour" type="number" class="form-control" min="0" max="23">
          </div>
        </div>

        <h6 class="border-bottom pb-2 mb-3">B模式批量选项（张数）</h6>
        <div class="mb-4">
          <input v-model="modeBOptionsStr" type="text" class="form-control"
                 placeholder="例如：50,100,200,300,400,500">
          <div class="form-text">用逗号分隔多个数字</div>
        </div>

        <button class="btn btn-primary" @click="saveSettings" :disabled="saving">
          <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>
          保存设置
        </button>
      </div>
    </div>
  </div>
</div>
{% endraw %}
{% endblock %}
{% block scripts %}
<script>
const { createApp } = Vue;
let settingsRequestSeq = 0;
createApp({
  data() {
    return {
      s: {},
      saving: false,
      saved: false,
      error: '',
      modeBOptionsStr: '',
      databaseInfo: { engine: '', path: '' },
    };
  },
  async mounted() {
    const requestSeq = ++settingsRequestSeq;
    try {
      const res = await fetch('/admin/api/settings');
      const data = await res.json();
      if (!res.ok || data.success === false) {
        throw new Error(data.error || '加载设置失败');
      }
      if (requestSeq !== settingsRequestSeq) return;
      this.databaseInfo = data.database_info || { engine: '', path: '' };
      delete data.database_info;
      this.s = data;
      this.modeBOptionsStr = (this.s.mode_b_options || []).join(',');
    } catch (e) {
      if (requestSeq !== settingsRequestSeq) return;
      this.error = e.message || '加载设置失败';
    }
  },
  methods: {
    async saveSettings() {
      const requestSeq = ++settingsRequestSeq;
      this.saving = true;
      this.saved = false;
      this.error = '';
      try {
        this.s.mode_b_options = this.modeBOptionsStr.split(',').map(v => parseInt(v.trim(), 10)).filter(v => !isNaN(v));
        const res = await fetch('/admin/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.s),
        });
        const data = await res.json();
        if (!res.ok || data.success === false) {
          throw new Error(data.error || '保存失败');
        }
        if (requestSeq !== settingsRequestSeq) return;
        this.saved = true;
        setTimeout(() => this.saved = false, 3000);
      } catch (e) {
        if (requestSeq !== settingsRequestSeq) return;
        this.error = e.message || '保存失败';
      } finally {
        if (requestSeq !== settingsRequestSeq) return;
        this.saving = false;
      }
    },
  }
}).mount('#settings-app');
</script>
{% endblock %}
