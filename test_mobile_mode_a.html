<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A模式手机端显示测试</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../static/css/style.css">
  <style>
    body {
      background: #f8f9fa;
      padding: 0;
      margin: 0;
    }
    .test-info {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-bottom: 2px solid #0d6efd;
      padding: 0.5rem;
      z-index: 1000;
      font-size: 0.75rem;
    }
    .test-container {
      margin-top: 60px;
      padding: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="test-info">
    <div class="d-flex justify-content-between align-items-center">
      <span><strong>屏幕:</strong> <span id="screen-size"></span></span>
      <span><strong>视口:</strong> <span id="viewport-size"></span></span>
    </div>
  </div>

  <div class="test-container">
    <div id="client-dashboard">
      <!-- Stats bar -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <div class="card text-center border-primary">
            <div class="card-body py-2">
              <div class="fs-5 fw-bold text-primary">15</div>
              <div class="small text-muted">今日出票</div>
            </div>
          </div>
        </div>
        <div class="col-6">
          <div class="card text-center border-success">
            <div class="card-body py-2">
              <div class="fs-5 fw-bold text-success">¥1200</div>
              <div class="small text-muted">今日金额</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mode A section -->
      <div id="mode-a" class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-play-circle"></i> A模式接单</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" checked id="modeASwitch" style="width:3em;height:1.5em">
            <label class="form-check-label fw-bold fs-6">接单中</label>
          </div>
        </div>
        <div class="card-body text-center">
          <div class="position-relative">
            <!-- Ticket display -->
            <div class="card bg-light border-primary mode-a-ticket-container">
              <div class="card-body p-2">
                <!-- 倒计时 -->
                <div class="d-flex justify-content-between align-items-center mb-2 flex-shrink-0">
                  <div class="small text-muted">期号: 26034</div>
                  <div class="text-end">
                    <div class="text-danger fw-bold fs-6" id="countdown">23:45:12</div>
                    <div class="small text-muted">截止 21:55</div>
                  </div>
                </div>

                <!-- 票面内容 -->
                <div class="bg-white border rounded p-2 text-start mode-a-ticket-content">
                  <div id="ticket-content"></div>
                </div>
              </div>
            </div>

            <!-- Action buttons -->
            <div class="d-flex gap-2 mt-2 justify-content-center flex-shrink-0">
              <button class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> 上一张
              </button>
              <button class="btn btn-primary btn-sm px-3">
                下一张 <i class="bi bi-arrow-right"></i>
              </button>
              <button class="btn btn-outline-danger btn-sm">
                <i class="bi bi-stop-circle"></i> 停止
              </button>
            </div>

            <!-- History indicator -->
            <div class="mt-1 text-center flex-shrink-0">
              <span class="d-inline-block rounded-circle me-1 bg-secondary" style="width:6px;height:6px"></span>
              <span class="d-inline-block rounded-circle me-1 bg-primary" style="width:6px;height:6px"></span>
              <span class="d-inline-block rounded-circle me-1 bg-secondary" style="width:6px;height:6px"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../static/js/ticket_renderer.js"></script>
  <script>
    // 显示屏幕信息
    function updateScreenInfo() {
      document.getElementById('screen-size').textContent =
        `${screen.width}×${screen.height}`;
      document.getElementById('viewport-size').textContent =
        `${window.innerWidth}×${window.innerHeight}`;
    }
    updateScreenInfo();
    window.addEventListener('resize', updateScreenInfo);

    // 测试票面渲染
    const testTicket = 'SPF|1=3,2=0,3=0/1,4=3,5=0/1/3,6=0,7=1,8=3,9=0/1,10=3|10*1|3';
    document.getElementById('ticket-content').innerHTML =
      renderTicketHTML(testTicket, '胜平负');

    // 倒计时模拟
    let seconds = 85512;
    setInterval(() => {
      seconds--;
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      document.getElementById('countdown').textContent =
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  </script>
</body>
</html>
