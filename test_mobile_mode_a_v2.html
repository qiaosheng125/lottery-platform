<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A模式手机端显示测试 v2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../static/css/style.css">
  <style>
    body {
      background: #f8f9fa;
      padding: 0;
      margin: 0;
    }
    .test-info {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-bottom: 2px solid #0d6efd;
      padding: 0.5rem;
      z-index: 1000;
      font-size: 0.75rem;
    }
    .test-container {
      margin-top: 60px;
      padding: 0.5rem;
    }
    .test-toggle {
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 1001;
    }
  </style>
</head>
<body>
  <div class="test-info">
    <div class="d-flex justify-content-between align-items-center">
      <span><strong>屏幕:</strong> <span id="screen-size"></span></span>
      <span><strong>视口:</strong> <span id="viewport-size"></span></span>
      <button class="btn btn-sm btn-primary" onclick="toggleFullscreen()">
        <i class="bi bi-arrows-fullscreen"></i>
      </button>
    </div>
  </div>

  <div class="test-container">
    <div id="client-dashboard">
      <!-- Stats bar -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <div class="card text-center border-primary">
            <div class="card-body py-2">
              <div class="fs-5 fw-bold text-primary">15</div>
              <div class="small text-muted">今日出票</div>
            </div>
          </div>
        </div>
        <div class="col-6">
          <div class="card text-center border-success">
            <div class="card-body py-2">
              <div class="fs-5 fw-bold text-success">¥1200</div>
              <div class="small text-muted">今日金额</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mode A section -->
      <div id="mode-a" class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-play-circle"></i> A模式接单</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" checked id="modeASwitch" style="width:3em;height:1.5em">
            <label class="form-check-label fw-bold fs-6">接单中</label>
          </div>
        </div>
        <div class="card-body text-center p-2">
          <div class="position-relative">
            <!-- 全屏票面显示容器 -->
            <div class="mode-a-fullscreen-container">
              <!-- 倒计时 - 固定顶部 -->
              <div class="mode-a-countdown-bar">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="text-white small">期号: 26034</div>
                  <div class="text-end">
                    <div class="text-white fw-bold countdown-text" id="countdown">23:45:12</div>
                    <div class="small text-white-50">截止 21:55</div>
                  </div>
                </div>
              </div>

              <!-- 票面内容 - 可滚动区域 -->
              <div class="mode-a-ticket-scroll">
                <div id="ticket-content"></div>
              </div>

              <!-- 操作按钮 - 固定底部 -->
              <div class="mode-a-action-bar">
                <div class="d-flex gap-2 justify-content-center mb-2">
                  <button class="btn btn-outline-secondary mode-a-btn">
                    <i class="bi bi-arrow-left"></i> 上一张
                  </button>
                  <button class="btn btn-primary mode-a-btn mode-a-btn-primary">
                    下一张 <i class="bi bi-arrow-right"></i>
                  </button>
                  <button class="btn btn-danger mode-a-btn">
                    <i class="bi bi-stop-circle"></i> 停止
                  </button>
                </div>
                <!-- History indicator -->
                <div class="text-center">
                  <span class="d-inline-block rounded-circle me-1 history-dot bg-secondary"></span>
                  <span class="d-inline-block rounded-circle me-1 history-dot bg-primary"></span>
                  <span class="d-inline-block rounded-circle me-1 history-dot bg-secondary"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="test-toggle">
    <button class="btn btn-warning btn-sm" onclick="toggleModeAActive()">
      <i class="bi bi-eye"></i> 切换模式
    </button>
  </div>

  <script src="../static/js/ticket_renderer.js"></script>
  <script>
    // 显示屏幕信息
    function updateScreenInfo() {
      document.getElementById('screen-size').textContent =
        `${screen.width}×${screen.height}`;
      document.getElementById('viewport-size').textContent =
        `${window.innerWidth}×${window.innerHeight}`;
    }
    updateScreenInfo();
    window.addEventListener('resize', updateScreenInfo);

    // 测试票面渲染
    const testTicket = 'SPF|1=3,2=0,3=0/1,4=3,5=0/1/3,6=0,7=1,8=3,9=0/1,10=3|10*1|3';
    document.getElementById('ticket-content').innerHTML =
      renderTicketHTML(testTicket, '胜平负');

    // 倒计时模拟
    let seconds = 85512;
    setInterval(() => {
      seconds--;
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      document.getElementById('countdown').textContent =
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);

    // 切换全屏
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    // 切换mode-a-active class（模拟防误触）
    function toggleModeAActive() {
      document.body.classList.toggle('mode-a-active');
      const isActive = document.body.classList.contains('mode-a-active');
      alert(isActive ? '已启用防误触模式（统计栏隐藏，页面锁定）' : '已关闭防误触模式');
    }
  </script>
</body>
</html>
